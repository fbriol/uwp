# Custom osmconf.ini for the UWP pipeline.
#
# GDAL's OSM driver only exposes a small subset of OSM tags as SQL-queryable
# columns by default. The stock config does NOT expose `water=*`, so an
# `ogr2ogr -where "water NOT IN (...)"` filter fails with:
#
#     ERROR 1: "water" not recognised as an available field.
#
# This file enables the `water` and `wetland` attributes on the
# `multipolygons` layer so `convert_to_shp()` in update_water_polygons.py
# can filter out narrow water sub-types (stream, canal, ditch, drain) at
# the ogr2ogr stage.
#
# The other sections mirror GDAL's defaults closely — we only care about
# multipolygons for the UWP workflow, but we keep the other layers
# functional in case someone reads them ad-hoc.
#
# Pointed to via the OSM_CONFIG_FILE environment variable when ogr2ogr is
# invoked (see convert_to_shp).

[general]
attribute_name_laundering=yes
report_all_nodes=no
report_all_ways=no

[points]
osm_id=yes
attributes=name,barrier,highway,ref,address,is_in,place,man_made

[lines]
osm_id=yes
attributes=name,highway,waterway,aerialway,barrier,man_made,railway

[multilinestrings]
osm_id=yes
attributes=name,type

[other_relations]
osm_id=yes
attributes=name,type

[multipolygons]
osm_id=yes
# `water` and `wetland` added on top of GDAL's stock attribute list so the
# UWP filter can distinguish lakes / lagoons / rivers from streams,
# canals, ditches and drains.
attributes=name,type,aeroway,amenity,admin_level,barrier,boundary,building,craft,geological,historic,land_area,landuse,leisure,man_made,military,natural,office,place,shop,sport,tourism,water,waterway,wetland
