# Reproducible build + runtime environment for the UWP project.
#
# Create or update the environment with:
#   conda env create -f environment.yml          # first time
#   conda env update -f environment.yml --prune  # subsequent updates
#
# Or, more simply, run `script/init_workspace.sh` which wraps the above.
#
# On the CNES cluster, load conda first (e.g. `module load conda`) then run
# the same commands.
name: uwp
channels:
  - conda-forge
dependencies:
  # --- Python (script orchestration) -----------------------------------------
  - python>=3.10

  # --- C++ build toolchain ---------------------------------------------------
  # cxx-compiler installs gcc/g++ on Linux, clang on macOS, MSVC stub on
  # Windows — keeps the env file portable.
  - cxx-compiler
  - cmake>=3.16
  - make
  - ninja

  # --- C++ libraries used by uwp --------------------------------------------
  # CMakeLists requires Boost >= 1.79; conda-forge ships 1.84+.
  - boost-cpp>=1.79
  # shapelib is vendored under third_party/, so no conda package needed.

  # --- Runtime tools called by script/update_water_polygons.py --------------
  - osmium-tool          # extracts natural=water features from OSM PBF
  - gdal                 # provides ogr2ogr to convert to ESRI Shapefile

  # --- QA / visualisation (script/visualize_diff.py) ------------------------
  # Pulls a few hundred MB of deps; install on workstations / QA nodes, skip
  # on minimal production deployments by removing this block.
  - geopandas            # vector I/O + spatial joins on top of shapely/pyogrio
  - matplotlib           # plotting backend
  - contextily           # OSM basemap tiles (optional, used with --basemap)
  - pyogrio              # fast shapefile reader (geopandas backend)
